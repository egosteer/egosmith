### DPVO Config File ###

# VO config (increase for better accuracy, decrease for lower memory)
# Restored to DPVO original defaults; our HaWoR-specific memory tuning is now
# mainly handled by input downsampling in src/lib/pipeline/slam/dpvo_slam.py.
PATCHES_PER_FRAME: 96         # default 96
REMOVAL_WINDOW: 22            # default 22
OPTIMIZATION_WINDOW: 10       # default 10
PATCH_LIFETIME: 13            # default 13

# threshold for keyframe removal
KEYFRAME_THRESH: 15.0

# camera motion model
MOTION_MODEL: 'DAMPED_LINEAR'
MOTION_DAMPING: 0.5

# maybe use mixed precision for inference
MIXED_PRECISION: True

CENTROID_SEL_STRAT: 'RANDOM'
